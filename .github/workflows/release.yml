name: Publish

# Tag-triggered npm publish via Trusted Publishing (OIDC).
# Modern 2025-2026 community standard — replaces NPM_TOKEN + semantic-release.
# Requires one-time manual setup: add a Trusted Publisher on
# https://www.npmjs.com/package/opencode-sweeper/access pointing at
# jeffusion/opencode-sweeper with workflow filename `release.yml`.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Set up Node.js for npm publish (OIDC Trusted Publishing)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm supports Trusted Publishing (>= 11.5.1)
        run: npm install -g npm@^11.5.2

      - name: Publish to npm (Trusted Publishing — no NPM_TOKEN, no NODE_AUTH_TOKEN)
        run: npm publish --access public
